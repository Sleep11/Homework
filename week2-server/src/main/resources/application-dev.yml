# 应用服务 WEB 访问端口
server:
  port: 8080
# 应用名称
#spring.application.name=studentserver   每一级属性有一个缩进table    属性和值有个空格
spring:
  application:
    name: travel-server
    #配置数据源链接MySQL数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/week2?serverTimezone=GMT%2B8&useSSL=false&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: root
    #配置json时间格式
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  redis:
    host: 127.0.0.1
    port: 6379
    timeout: 10000
    jedis:
      pool:
        max-active: 5000  # 连接池最大连接数（使用负值表示没有限制）
        max-wait: 1000  # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-idle: 5000    # 连接池中的最大空闲连接
        min-idle: 3       # 连接池中的最小空闲连接
    database: 0
#mybatis-plus配置
mybatis-plus:
  #配置mybatis-plus的映射xml文件
  mapper-locations: classpath:mapper/*.xml
  #配置实体别名
  type-aliases-package: com.bwie.pojo
  configuration:
    #关闭缓存
    cache-enabled: false
    #控制台打印SQL语句
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-enums-package: com.bwie.enums
